<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNAKE — ARCADE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #050510;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
  }

  .bg-grid {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,180,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,180,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  h1 {
    font-size: clamp(18px, 4vw, 28px);
    color: #00ffb4;
    text-shadow:
      0 0 10px #00ffb4,
      0 0 30px #00ffb4,
      0 0 60px #00ffb488;
    letter-spacing: 6px;
    animation: flicker 4s infinite;
  }

  @keyframes flicker {
    0%,95%,100% { opacity: 1; }
    96% { opacity: 0.7; }
    97% { opacity: 1; }
    98% { opacity: 0.5; }
  }

  .score-bar {
    display: flex;
    gap: 32px;
    font-size: 10px;
    color: #ffffff88;
  }

  .score-bar span { color: #00ffb4; }

  #gameCanvas {
    border: 2px solid #00ffb433;
    box-shadow:
      0 0 0 1px #00ffb422,
      0 0 20px #00ffb422,
      inset 0 0 40px #00000088;
    border-radius: 4px;
    display: block;
    background: #070718;
  }

  #overlay {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    background: rgba(5,5,16,0.92);
    border-radius: 4px;
    padding: 32px;
    text-align: center;
  }

  #overlay h2 {
    font-size: clamp(12px, 2.5vw, 18px);
    color: #00ffb4;
    text-shadow: 0 0 20px #00ffb4;
  }

  #overlay p {
    font-size: 8px;
    color: #ffffff66;
    line-height: 1.8;
  }

  #overlay .final-score {
    font-size: clamp(14px, 3vw, 22px);
    color: #ff4fff;
    text-shadow: 0 0 20px #ff4fff;
  }

  .btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    padding: 14px 28px;
    background: transparent;
    border: 2px solid #00ffb4;
    color: #00ffb4;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 2px;
    transition: all 0.15s;
    box-shadow: 0 0 10px #00ffb444;
    border-radius: 2px;
  }

  .btn:hover {
    background: #00ffb4;
    color: #050510;
    box-shadow: 0 0 30px #00ffb4;
  }

  .controls-hint {
    font-size: 7px;
    color: #ffffff33;
    letter-spacing: 1px;
    text-align: center;
    line-height: 2;
  }
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="wrapper">
  <h1>🐍 SNAKE</h1>

  <div class="score-bar">
    SCORE <span id="scoreDisplay">0</span>
    &nbsp;&nbsp;&nbsp;
    BEST <span id="bestDisplay">0</span>
  </div>

  <div style="position:relative;">
    <canvas id="gameCanvas"></canvas>
    <div id="overlay">
      <h2 id="overlayTitle">READY?</h2>
      <p id="overlayMsg">USE ARROW KEYS OR SWIPE<br>TO MOVE THE SNAKE<br>EAT THE FOOD TO GROW</p>
      <button class="btn" id="startBtn" onclick="startGame()">START</button>
    </div>
  </div>

  <div class="controls-hint">
    ↑ ↓ ← → ARROW KEYS &nbsp;|&nbsp; SWIPE ON MOBILE
  </div>
</div>

<script>
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const scoreDisplay = document.getElementById('scoreDisplay');
  const bestDisplay = document.getElementById('bestDisplay');

  // Responsive canvas
  const CELL = 20;
  const COLS = 20;
  const ROWS = 20;
  canvas.width = CELL * COLS;
  canvas.height = CELL * ROWS;
  overlay.style.width = canvas.width + 'px';
  overlay.style.height = canvas.height + 'px';

  let snake, dir, nextDir, food, score, best = 0, gameLoop, speed;
  let gameRunning = false;

  // Colors
  const COLORS = {
    head: '#00ffb4',
    body: '#00cc90',
    bodyDark: '#008860',
    food: '#ff4fff',
    foodGlow: '#ff4fff',
    eye: '#050510',
    grid: '#ffffff04'
  };

  function initGame() {
    snake = [
      { x: 10, y: 10 },
      { x: 9, y: 10 },
      { x: 8, y: 10 },
    ];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    speed = 130;
    scoreDisplay.textContent = '0';
    spawnFood();
  }

  function spawnFood() {
    let pos;
    do {
      pos = {
        x: Math.floor(Math.random() * COLS),
        y: Math.floor(Math.random() * ROWS)
      };
    } while (snake.some(s => s.x === pos.x && s.y === pos.y));
    food = pos;
  }

  function startGame() {
    overlay.style.display = 'none';
    initGame();
    gameRunning = true;
    if (gameLoop) clearInterval(gameLoop);
    gameLoop = setInterval(tick, speed);
  }

  function tick() {
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // Wall collision
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
      endGame(); return;
    }
    // Self collision
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
      endGame(); return;
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score += 10;
      if (score > best) best = score;
      scoreDisplay.textContent = score;
      bestDisplay.textContent = best;
      spawnFood();
      // Speed up slightly
      if (score % 50 === 0 && speed > 60) {
        speed = Math.max(60, speed - 10);
        clearInterval(gameLoop);
        gameLoop = setInterval(tick, speed);
      }
    } else {
      snake.pop();
    }

    draw();
  }

  function endGame() {
    clearInterval(gameLoop);
    gameRunning = false;
    document.getElementById('overlayTitle').textContent = 'GAME OVER';
    document.getElementById('overlayMsg').innerHTML =
      `SCORE &nbsp;<span style="color:#ff4fff">${score}</span>&nbsp; POINTS`;
    document.getElementById('startBtn').textContent = 'RETRY';
    overlay.style.display = 'flex';
  }

  function draw() {
    // Clear
    ctx.fillStyle = '#070718';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Subtle grid
    ctx.strokeStyle = COLORS.grid;
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= COLS; x++) {
      ctx.beginPath();
      ctx.moveTo(x * CELL, 0);
      ctx.lineTo(x * CELL, canvas.height);
      ctx.stroke();
    }
    for (let y = 0; y <= ROWS; y++) {
      ctx.beginPath();
      ctx.moveTo(0, y * CELL);
      ctx.lineTo(canvas.width, y * CELL);
      ctx.stroke();
    }

    // Food glow
    ctx.save();
    ctx.shadowColor = COLORS.foodGlow;
    ctx.shadowBlur = 18;
    ctx.fillStyle = COLORS.food;
    const fx = food.x * CELL + CELL/2;
    const fy = food.y * CELL + CELL/2;
    ctx.beginPath();
    ctx.arc(fx, fy, CELL/2 - 3, 0, Math.PI * 2);
    ctx.fill();
    // Inner shine
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#ffaaff';
    ctx.beginPath();
    ctx.arc(fx - 3, fy - 3, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Snake body
    snake.forEach((seg, i) => {
      const x = seg.x * CELL;
      const y = seg.y * CELL;
      const pad = 1;
      const r = 4;

      if (i === 0) {
        // Head with glow
        ctx.save();
        ctx.shadowColor = COLORS.head;
        ctx.shadowBlur = 14;
        ctx.fillStyle = COLORS.head;
        roundRect(ctx, x + pad, y + pad, CELL - pad*2, CELL - pad*2, r);
        ctx.fill();
        ctx.restore();

        // Eyes
        ctx.fillStyle = COLORS.eye;
        const eyeSize = 3;
        const ex = dir.x === 1 ? x + CELL - 7 : dir.x === -1 ? x + 4 : x + CELL/2 - 4;
        const ey = dir.y === 1 ? y + CELL - 7 : dir.y === -1 ? y + 4 : y + CELL/2 - 4;
        ctx.beginPath();
        ctx.arc(ex, ey, eyeSize, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(ex + (dir.y !== 0 ? 8 : 0), ey + (dir.x !== 0 ? 8 : 0), eyeSize, 0, Math.PI * 2);
        ctx.fill();

      } else {
        // Body gradient based on position
        const ratio = i / snake.length;
        const alpha = Math.max(0.3, 1 - ratio * 0.5);
        ctx.globalAlpha = alpha;
        ctx.fillStyle = i % 2 === 0 ? COLORS.body : COLORS.bodyDark;
        roundRect(ctx, x + pad, y + pad, CELL - pad*2, CELL - pad*2, r - 1);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    });
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  // Keyboard controls
  document.addEventListener('keydown', e => {
    if (!gameRunning) return;
    switch(e.key) {
      case 'ArrowUp':    if (dir.y !== 1)  nextDir = {x:0,y:-1}; e.preventDefault(); break;
      case 'ArrowDown':  if (dir.y !== -1) nextDir = {x:0,y:1};  e.preventDefault(); break;
      case 'ArrowLeft':  if (dir.x !== 1)  nextDir = {x:-1,y:0}; e.preventDefault(); break;
      case 'ArrowRight': if (dir.x !== -1) nextDir = {x:1,y:0};  e.preventDefault(); break;
    }
  });

  // Touch / swipe controls
  let touchStartX, touchStartY;
  canvas.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    e.preventDefault();
  }, { passive: false });

  canvas.addEventListener('touchend', e => {
    if (!gameRunning) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > Math.abs(dy)) {
      if (dx > 20 && dir.x !== -1) nextDir = {x:1,y:0};
      else if (dx < -20 && dir.x !== 1) nextDir = {x:-1,y:0};
    } else {
      if (dy > 20 && dir.y !== -1) nextDir = {x:0,y:1};
      else if (dy < -20 && dir.y !== 1) nextDir = {x:0,y:-1};
    }
    e.preventDefault();
  }, { passive: false });

  // Initial draw
  ctx.fillStyle = '#070718';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
</script>
</body>
</html>
